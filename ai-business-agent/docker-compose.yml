version: "3.8"

services:
  agent:
    build: .
    container_name: ai-business-agent
    ports:
      - "8000:8000"
    volumes:
      # Persistente data (database, plugins)
      - ./data:/app/data
      # Business context
      - ./data/business_context.json:/app/data/business_context.json
      # Obsidian vault (pas het pad aan!)
      # - /pad/naar/je/ObsidianVault:/vault:ro
    environment:
      - DATABASE_PATH=data/agent_memory.db
      - BUSINESS_CONTEXT_PATH=data/business_context.json
      # - OBSIDIAN_VAULT_PATH=/vault
      # - API_TOKEN=jouw-token-hier
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
